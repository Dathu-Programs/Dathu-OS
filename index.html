<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dathu OS - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap');

        :root {
            --cyan-glow: #06b6d4;
            --dathu-bg: #020408;
            --dathu-panel: rgba(10, 15, 25, 0.95);
        }

        body {
            background-color: #000;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        /* Mobile Intro Style */
        #mobile-init-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #05101a 0%, #000 100%);
        }

        .mobile-device {
            width: 300px;
            height: 600px;
            background: #111;
            border: 10px solid #222;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 100px rgba(6, 182, 212, 0.2);
            overflow: hidden;
        }

        .mobile-screen {
            height: 100%;
            background: linear-gradient(180deg, #0a1219 0%, #000 100%);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Desktop Environment */
        #desktop-environment {
            display: none;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1614850523296-e811d9ed0765?auto=format&fit=crop&q=80&w=2070') center/cover;
            position: relative;
        }

        .glass-panel {
            background: var(--dathu-panel);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            position: absolute;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .window-header {
            cursor: move;
            background: rgba(6, 182, 212, 0.1);
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .desktop-icon {
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .desktop-icon:hover { background: rgba(255, 255, 255, 0.1); }

        .hidden { display: none !important; }

        /* Radio App Specifics */
        .radio-station-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .radio-station-item:hover {
            background: rgba(6, 182, 212, 0.1);
        }
        .eq-bar {
            width: 3px;
            background: var(--cyan-glow);
            margin: 0 1px;
            height: 2px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--cyan-glow);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Loading Spinner */
        .loader-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        /* CRT Effect */
        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            z-index: 10000;
            pointer-events: none;
        }
    </style>
</head>
<body class="crt">

    <!-- 1. MOBILE INITIALIZATION -->
    <div id="mobile-init-container">
        <div class="mobile-device">
            <div class="mobile-screen">
                <div class="mt-10 mb-20 text-center">
                    <i class="fas fa-atom text-5xl text-cyan-500 mb-4 animate-spin-slow"></i>
                    <h1 class="text-xl font-black tracking-widest text-white uppercase">Dathu OS</h1>
                    <p class="text-[10px] text-cyan-800">MOBILE AUTHENTICATOR</p>
                </div>
                <div onclick="startLoading()" class="w-20 h-20 rounded-full border-2 border-cyan-500 flex items-center justify-center cursor-pointer hover:bg-cyan-500/10">
                    <i class="fas fa-fingerprint text-3xl text-cyan-400"></i>
                </div>
                <p class="text-[10px] text-cyan-600 mt-4 animate-pulse">Touch to Authorize</p>
                <div id="mobile-loader" class="hidden w-full mt-10">
                    <div class="h-1 bg-cyan-950 overflow-hidden"><div id="load-progress" class="h-full bg-cyan-500" style="width: 0%"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. DESKTOP ENVIRONMENT -->
    <div id="desktop-environment">
        <div class="h-8 bg-black/60 backdrop-blur-md border-b border-white/10 flex items-center justify-between px-4">
            <div class="flex items-center gap-4 text-[10px]">
                <span class="text-cyan-500 font-bold">DATHU KERNEL 9.0.1</span>
                <span id="gpu-status" class="text-slate-500 uppercase">GPU_STATUS: STABLE</span>
            </div>
            <div id="os-clock" class="text-[10px] text-slate-300 font-bold">00:00:00</div>
        </div>

        <div class="p-4 grid grid-cols-1 gap-4 w-max">
            <div onclick="openApp('radio')" class="desktop-icon">
                <i class="fas fa-broadcast-tower text-3xl text-red-500"></i>
                <span class="text-[9px] text-white font-bold uppercase text-center">Frequency</span>
            </div>
            <div onclick="openApp('terminal')" class="desktop-icon">
                <i class="fas fa-terminal text-3xl text-cyan-500"></i>
                <span class="text-[9px] text-white font-bold uppercase text-center">Terminal</span>
            </div>
        </div>

        <div id="window-layer">
            
            <!-- FREQUENCY RADIO APP (API INTEGRATED) -->
            <div id="app-radio" class="glass-panel hidden" style="width: 700px; height: 520px; left: 250px; top: 80px;">
                <div class="window-header">
                    <span class="text-[10px] font-bold text-red-500 uppercase"><i class="fas fa-globe mr-2"></i>Dathu Frequency Global v5.0</span>
                    <i class="fas fa-times text-xs text-red-500 cursor-pointer" onclick="closeApp('radio')"></i>
                </div>
                <div class="flex flex-1 overflow-hidden">
                    <div class="w-2/5 bg-black/40 border-r border-white/5 flex flex-col">
                        <div class="p-3 border-b border-white/5 bg-black/20">
                            <div class="relative">
                                <input type="text" id="radio-search-input" placeholder="Search 30,000+ stations..." class="w-full bg-white/5 border border-white/10 text-[9px] p-2 pl-8 outline-none text-white focus:border-red-500/50 transition-all">
                                <i class="fas fa-search absolute left-3 top-2.5 text-[10px] text-slate-500"></i>
                            </div>
                            <div class="flex gap-2 mt-2">
                                <select id="radio-filter-country" class="bg-black text-[8px] text-slate-400 border border-white/10 outline-none flex-1">
                                    <option value="">All Countries</option>
                                    <option value="NO">Norway</option>
                                    <option value="US">USA</option>
                                    <option value="DE">Germany</option>
                                    <option value="JP">Japan</option>
                                </select>
                                <button onclick="searchRadio()" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 text-[8px] px-3 border border-red-500/20 uppercase font-bold">Fetch</button>
                            </div>
                        </div>
                        <div class="flex-1 overflow-y-auto" id="radio-list">
                            <div class="p-10 text-center opacity-20">
                                <i class="fas fa-satellite-dish text-4xl mb-4"></i>
                                <p class="text-[8px] uppercase">Awaiting Uplink...</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex-1 p-6 flex flex-col items-center justify-between text-center relative">
                        <div id="radio-visual-bg" class="absolute inset-0 opacity-5 pointer-events-none transition-all duration-1000"></div>
                        
                        <div class="w-full z-10">
                            <div class="w-28 h-28 rounded-xl border-2 border-red-500/20 mx-auto flex items-center justify-center relative mb-4 bg-black/40 shadow-2xl overflow-hidden">
                                <img id="station-logo" src="" class="absolute inset-0 w-full h-full object-contain hidden" onerror="this.style.display='none'">
                                <i id="radio-main-icon" class="fas fa-broadcast-tower text-4xl text-red-500"></i>
                                <div class="absolute inset-0 flex items-end justify-center gap-1 pb-4" id="eq-container"></div>
                            </div>
                            <h2 id="current-station" class="text-xs font-bold uppercase text-white tracking-widest truncate px-4">Frequency Idle</h2>
                            <p id="current-status-text" class="text-[8px] text-red-500/60 uppercase mt-1 tracking-tighter">Ready for Global Handshake</p>
                        </div>
                        
                        <div class="w-full space-y-4 z-10 bg-black/20 p-4 rounded-lg">
                            <div class="flex justify-between text-[8px] text-slate-500 uppercase px-1">
                                <span id="meta-location">LOC: OFF-GRID</span>
                                <span id="meta-bitrate">DATA: 0 KBPS</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <i class="fas fa-volume-off text-[10px] text-slate-500"></i>
                                <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider" id="radio-volume">
                                <i class="fas fa-volume-up text-[10px] text-slate-500"></i>
                            </div>
                            <div class="flex justify-center gap-6 items-center">
                                <div onclick="toggleRadioPlay()" class="w-14 h-14 bg-red-500/10 border border-red-500/30 rounded-full flex items-center justify-center cursor-pointer hover:bg-red-500/20 transition-all group">
                                    <i id="play-pause-icon" class="fas fa-play text-red-500 group-hover:scale-110"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TERMINAL -->
            <div id="app-terminal" class="glass-panel hidden" style="width: 500px; height: 350px; left: 100px; top: 100px;">
                <div class="window-header">
                    <span class="text-[10px] font-bold text-cyan-500 uppercase">Shell</span>
                    <i class="fas fa-times text-xs text-red-500 cursor-pointer" onclick="closeApp('terminal')"></i>
                </div>
                <div id="term-out" class="flex-1 p-3 font-mono text-[10px] overflow-y-auto bg-black/40"></div>
                <div class="p-2 border-t border-white/5 flex gap-2">
                    <span class="text-cyan-600 text-[10px]">root@dathu:~$</span>
                    <input type="text" onkeydown="handleTerm(event, this)" class="bg-transparent border-none outline-none text-[10px] text-white flex-1">
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 w-full h-10 bg-black/90 backdrop-blur-md border-t border-white/10 flex items-center px-2 gap-2 z-[9999]">
            <div class="w-8 h-8 bg-cyan-600 flex items-center justify-center font-black text-black">D</div>
            <div class="flex-1"></div>
            <div id="os-clock-taskbar" class="px-4 text-slate-500 text-[10px] font-bold">00:00:00</div>
        </div>
    </div>

    <script>
        // --- RADIO ENGINE 5.0 (GLOBAL FETCH) ---
        const radioPlayer = new Audio();
        let isPlaying = false;
        let eqInterval;
        const API_BASE = "https://de1.api.radio-browser.info/json";

        function initFrequency() {
            const eq = document.getElementById('eq-container');
            for(let i=0; i<15; i++) {
                const bar = document.createElement('div');
                bar.className = 'eq-bar';
                eq.appendChild(bar);
            }

            document.getElementById('radio-volume').addEventListener('input', (e) => {
                radioPlayer.volume = e.target.value;
            });

            // Handle Search Enter
            document.getElementById('radio-search-input').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') searchRadio();
            });

            // Audio Events
            radioPlayer.onplaying = () => { isPlaying = true; updateRadioUI('playing'); startEQ(); };
            radioPlayer.onpause = () => { isPlaying = false; updateRadioUI('paused'); stopEQ(); };
            radioPlayer.onloadstart = () => updateRadioUI('buffering');
            radioPlayer.onerror = () => updateRadioUI('error');

            // Default Search on Load
            searchRadio("Synthwave");
        }

        async function searchRadio(query = "") {
            const input = document.getElementById('radio-search-input');
            const country = document.getElementById('radio-filter-country').value;
            const term = query || input.value || "lofi";
            const list = document.getElementById('radio-list');
            
            list.innerHTML = `<div class="p-10 text-center"><i class="fas fa-circle-notch loader-spin text-red-500 text-xl"></i></div>`;

            try {
                let url = `${API_BASE}/stations/byname/${term}?limit=50&hidebroken=true`;
                if(country) url = `${API_BASE}/stations/bycountrycode/${country}?limit=50&hidebroken=true`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                list.innerHTML = "";
                if(data.length === 0) {
                    list.innerHTML = `<div class="p-6 text-[8px] uppercase text-slate-500">No stations found on this frequency.</div>`;
                    return;
                }

                data.forEach(station => {
                    const div = document.createElement('div');
                    div.className = 'radio-station-item p-3 cursor-pointer group flex gap-3 items-center';
                    div.innerHTML = `
                        <div class="w-8 h-8 bg-white/5 rounded flex items-center justify-center overflow-hidden shrink-0 border border-white/5">
                            ${station.favicon ? `<img src="${station.favicon}" class="w-full h-full object-cover" onerror="this.remove()">` : ''}
                            <i class="fas fa-music text-[10px] text-slate-600"></i>
                        </div>
                        <div class="overflow-hidden">
                            <h4 class="text-[9px] font-bold text-white uppercase truncate group-hover:text-red-500 transition-colors">${station.name}</h4>
                            <p class="text-[7px] text-slate-500 uppercase truncate">${station.countrycode} • ${station.bitrate || '??'} KBPS</p>
                        </div>
                    `;
                    div.onclick = () => streamStation(station);
                    list.appendChild(div);
                });
            } catch (err) {
                list.innerHTML = `<div class="p-6 text-[8px] uppercase text-red-500">Uplink Error: API Unavailable</div>`;
            }
        }

        function streamStation(station) {
            radioPlayer.src = station.url_resolved || station.url;
            radioPlayer.play().catch(e => {
                updateRadioUI('error');
                console.error("Playback failed", e);
            });

            document.getElementById('current-station').textContent = station.name;
            document.getElementById('meta-location').textContent = `LOC: ${station.countrycode || 'Global'}`;
            document.getElementById('meta-bitrate').textContent = `DATA: ${station.bitrate || 'VAR'} KBPS`;
            
            const logo = document.getElementById('station-logo');
            if(station.favicon) {
                logo.src = station.favicon;
                logo.style.display = 'block';
                document.getElementById('radio-main-icon').style.display = 'none';
                document.getElementById('radio-visual-bg').style.background = `radial-gradient(circle, ${'#ef4444'}22 0%, transparent 70%)`;
            } else {
                logo.style.display = 'none';
                document.getElementById('radio-main-icon').style.display = 'block';
            }
        }

        function toggleRadioPlay() {
            if(!radioPlayer.src) return;
            if(isPlaying) radioPlayer.pause();
            else radioPlayer.play();
        }

        function updateRadioUI(status) {
            const icon = document.getElementById('play-pause-icon');
            const statusText = document.getElementById('current-status-text');
            const mainIcon = document.getElementById('radio-main-icon');

            switch(status) {
                case 'playing':
                    icon.className = "fas fa-pause text-red-500";
                    statusText.textContent = "SIGNAL ACQUIRED - STREAMING LIVE";
                    mainIcon.classList.add('animate-pulse');
                    break;
                case 'paused':
                    icon.className = "fas fa-play text-red-500 ml-1";
                    statusText.textContent = "SIGNAL ON STANDBY";
                    mainIcon.classList.remove('animate-pulse');
                    break;
                case 'buffering':
                    statusText.textContent = "FETCHING DATA PACKETS...";
                    break;
                case 'error':
                    statusText.textContent = "SIGNAL DECRYPTION FAILED";
                    icon.className = "fas fa-exclamation-triangle text-red-500";
                    break;
            }
        }

        function startEQ() {
            clearInterval(eqInterval);
            const bars = document.querySelectorAll('.eq-bar');
            eqInterval = setInterval(() => {
                bars.forEach(bar => {
                    bar.style.height = (Math.random() * 30 + 2) + 'px';
                });
            }, 80);
        }

        function stopEQ() {
            clearInterval(eqInterval);
            document.querySelectorAll('.eq-bar').forEach(b => b.style.height = '2px');
        }

        // --- CORE OS LOGIC ---
        function startLoading() {
            document.getElementById('mobile-loader').classList.remove('hidden');
            let p = 0;
            const interval = setInterval(() => {
                p += 4;
                document.getElementById('load-progress').style.width = p + '%';
                if(p >= 100) {
                    clearInterval(interval);
                    document.getElementById('mobile-init-container').classList.add('hidden');
                    document.getElementById('desktop-environment').style.display = 'block';
                    initFrequency();
                    startClock();
                }
            }, 80);
        }

        function startClock() {
            setInterval(() => {
                const time = new Date().toLocaleTimeString('no-NO');
                document.getElementById('os-clock').textContent = time;
                document.getElementById('os-clock-taskbar').textContent = time;
            }, 1000);
        }

        function openApp(id) {
            const app = document.getElementById(`app-${id}`);
            app.classList.remove('hidden');
            app.style.zIndex = 1000;
        }

        function closeApp(id) {
            document.getElementById(`app-${id}`).classList.add('hidden');
            if(id === 'radio') radioPlayer.pause();
        }

        // Window Dragger
        let activeWin = null, isDragging = false, dx, dy;
        document.addEventListener('mousedown', e => {
            const h = e.target.closest('.window-header');
            if(h) {
                activeWin = h.parentElement;
                isDragging = true;
                dx = e.clientX - activeWin.offsetLeft;
                dy = e.clientY - activeWin.offsetTop;
                document.querySelectorAll('.glass-panel').forEach(w => w.style.zIndex = 500);
                activeWin.style.zIndex = 1000;
            }
        });
        document.addEventListener('mousemove', e => {
            if(isDragging && activeWin) {
                activeWin.style.left = (e.clientX - dx) + 'px';
                activeWin.style.top = (e.clientY - dy) + 'px';
            }
        });
        document.addEventListener('mouseup', () => isDragging = false);

        function handleTerm(e, input) {
            if(e.key === 'Enter') {
                const out = document.getElementById('term-out');
                out.innerHTML += `<p class="text-cyan-500">> ${input.value}</p>`;
                if(input.value === 'radio search') searchRadio();
                input.value = '';
                out.scrollTop = out.scrollHeight;
            }
        }
    </script>

<script>
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  }, false);
</script>

  // Blocks Ctrl+C, Ctrl+U (View Source), and Ctrl+Shift+I (DevTools)

    e.preventDefault();
    alert('Copying is disabled on this site.');
  }
});

        
    </script>

    
</body>
</html>
